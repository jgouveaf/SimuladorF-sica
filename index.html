<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FísicaSim PRO V3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>FísicaSim PRO <span style="font-size: 0.8rem; background: var(--primary); padding: 2px 6px; border-radius: 4px; vertical-align: middle;">V3</span></h1>
        <p class="subtitle">Simulador de Energia Mecânica (Versão Simplificada)</p>
    </header>

    <main>
        <section class="controls">
            <h2 style="color: var(--primary); margin-bottom: 1rem;">Configurações</h2>
            
            <div class="control-group">
                <label><strong>Cenário:</strong></label>
                <select id="scenario">
                    <option value="free">Queda Livre</option>
                    <option value="ramp">Rampa</option>
                    <option value="parabola">Parábola (U)</option>
                    <option value="loop">Looping</option>
                </select>
            </div>

            <div class="control-group">
                <label>Tempo: <span id="val-timescale">1.0</span>x</label>
                <input type="range" id="timescale" min="0.1" max="2.0" step="0.1" value="1.0">
            </div>

            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:1rem 0;">

            <div class="control-group">
                <label>Massa: <span id="val-mass">10</span>kg</label>
                <input type="range" id="mass" min="1" max="100" value="10">
            </div>

            <div class="control-group">
                <label>Atrito: <span id="val-friction">1</span>%</label>
                <input type="range" id="friction" min="0" max="10" step="0.1" value="1">
            </div>

            <div class="button-group">
                <button id="btn-reset" class="secondary">Resetar</button>
                <button id="btn-pause">Pausar</button>
            </div>

            <div class="control-group" style="margin-top: 1rem;">
                <label style="cursor:pointer;"><input type="checkbox" id="check-bar" checked> Mostrar Gráfico</label>
                <label style="cursor:pointer;"><input type="checkbox" id="check-slow"> Câmera Lenta</label>
            </div>
        </section>

        <section class="sim-container" id="sim-container">
            <canvas id="canvas"></canvas>
            <div style="position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none;">
                <div style="background: rgba(0,0,0,0.5); display: inline-block; padding: 10px 20px; border-radius: 10px; border: 1px solid var(--primary);">
                    <span style="color: var(--text-muted); font-size: 0.8rem;">ENERGIA TOTAL:</span><br>
                    <span id="val-te" style="color: var(--te-color); font-size: 1.5rem; font-weight: 800;">0.0 J</span>
                </div>
            </div>
        </section>
    </main>

    <footer style="margin-top: 2rem; opacity: 0.5;">
        FísicaSim PRO v3.0 - Última Atualização: Hoje
    </footer>

    <script src="physics.js?v=3"></script>
</body>
</html>
