<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FísicaSim PRO - Versão V4 DEFINITIVA</title>
    <style>
        :root { --p: #6366f1; --bg: #020617; --card: rgba(30, 41, 59, 0.8); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        header { padding: 12px; text-align: center; border-bottom: 2px solid var(--p); background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        main { display: grid; grid-template-columns: 300px 1fr; flex: 1; padding: 20px; gap: 20px; }
        .side { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        .sim { background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid var(--p); }
        canvas { width: 100%; height: 100%; border-radius: 18px; }
        select, input, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; color: white; font-size: 14px; outline: none; }
        button { background: var(--p); border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stats-box { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 15px 30px; border-radius: 15px; border: 2px solid var(--p); text-align: center; width: 240px; backdrop-filter: blur(10px); }
        #val-speed { font-size: 1.3rem; color: #22c55e; font-weight: 800; font-family: monospace; }
        #val-te { font-size: 1.5rem; color: #fbbf24; font-weight: 800; font-family: monospace; }
    </style>
</head>
<body>
    <header><h1>FísicaSim PRO <span style="font-size: 12px; background: #e11d48; color: white; padding: 2px 10px; border-radius: 6px; vertical-align: middle; margin-left: 10px;">PRO V4 FINAL</span></h1></header>
    <main>
        <div class="side">
            <div><label class="label">Pista Interativa:</label>
            <select id="scen">
                <option value="u">Tigela em Formato de U (∪)</option>
                <option value="free">Cenário: Queda Livre</option>
                <option value="ramp">Cenário: Rampa Reta</option>
                <option value="loop">Cenário: Ir e Voltar (Loop)</option>
            </select></div>
            <div><label class="label">Elasticidade (Bounce): <span id="v-e">75</span>%</label><input type="range" id="bounce" min="0" max="100" value="75"></div>
            <div><label class="label">Atrito: <span id="v-f">1.0</span>%</label><input type="range" id="f" min="0" max="10" step="0.1" value="1"></div>
            <button id="reset">Resetar Simulação</button>
            <button id="pause" style="background:#64748b;">Pausar Jogo</button>
            <div style="font-size: 11px; opacity: 0.6; margin-top: auto; line-height: 1.4;">
                <strong>Dica:</strong> Arraste a bola para o topo da tigela para ganhar bastante energia potencial!
            </div>
        </div>
        <div class="sim" id="cont">
            <canvas id="cv"></canvas>
            <div class="stats-box">
                <div class="label" style="justify-content: center;">Velocidade Velocímetro</div>
                <div id="val-speed">0.0 m/s</div>
                <div class="label" style="justify-content: center; margin-top: 10px;">Energia Hidromecânica</div>
                <div id="val-te">0.0 J</div>
            </div>
        </section>
    </main>
    <script>
        const cv = document.getElementById('cv'), ctx = cv.getContext('2d'), cont = document.getElementById('cont');
        const fIn = document.getElementById('f'), eIn = document.getElementById('bounce'), scSe = document.getElementById('scen'), bRe = document.getElementById('reset'), bPa = document.getElementById('pause');

        let w, h, paused = false, drag = false;
        let b = { x:0, y:0, r:18, vx:0, vy:0, m:10, f:0.01, th:0, elast: 0.75 };
        let scenario = 'u', maxE = 100;

        const getY = (x) => {
            if (scenario === 'free') return h - 80;
            const mid = w/2, sw = (w-200)/2;
            if (scenario === 'u') {
                const bot = h-100, top = 180, d = bot-top;
                const dist = Math.max(-sw, Math.min(sw, x-mid));
                return top + d * (1 - Math.pow(dist/sw, 2));
            }
            if (scenario === 'ramp') {
                if (x < 100) return 180;
                if (x > w-100) return h-100;
                return 180 + (x-100)*(h-280)/(w-200);
            }
            if (scenario === 'loop') {
                const base = h/2 + 80*Math.sin(x*0.018) + 120;
                if (x < 150) return base - Math.pow(150-x, 2)*0.08;
                if (x > w-150) return base - Math.pow(x-(w-150), 2)*0.08;
                return base;
            }
            return h-80;
        };

        function reset() {
            if (scenario === 'u') { b.x = w/2 - (w-300)/2; b.y = 200; }
            else if (scenario === 'free') { b.x = w/2; b.y = 100; }
            else if (scenario === 'ramp') { b.x = 120; b.y = 130; }
            else { b.x = 200; b.y = getY(200)-80; }
            b.vx = 0; b.vy = 0; b.th = 0;
        }

        function resize() { w = cont.clientWidth; h = cont.clientHeight; cv.width = w; cv.height = h; reset(); }
        window.onresize = resize; resize();

        fIn.oninput = () => { b.f = (+fIn.value/100)*1.5; document.getElementById('v-f').innerText = fIn.value; };
        eIn.oninput = () => { b.elast = +eIn.value/100; document.getElementById('v-e').innerText = eIn.value; };
        scSe.onchange = () => { scenario = scSe.value; reset(); };
        bRe.onclick = reset;
        bPa.onclick = () => { paused = !paused; bPa.innerText = paused ? 'Retomar' : 'Pausar'; };

        cv.onmousedown = (e) => { const r = cv.getBoundingClientRect(); if (Math.hypot(e.clientX-r.left-b.x, e.clientY-r.top-b.y) < 50) { drag = true; b.vx=0; b.vy=0; } };
        window.onmousemove = (e) => { if (drag) { const r = cv.getBoundingClientRect(); b.x = e.clientX-r.left; b.y = e.clientY-r.top; b.th = 0; } };
        window.onmouseup = () => drag = false;

        function update() {
            if (!paused && !drag) {
                const n = 20, dt = (1/60)/n, g = 9.8 * 60;
                for (let i=0; i<n; i++) {
                    b.vy += g * dt; b.x += b.vx * dt; b.y += b.vy * dt;
                    if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx)*0.5; }
                    if (b.x > w-b.r) { b.x = w-b.r; b.vx = -Math.abs(b.vx)*0.5; }
                    
                    const gy = getY(b.x);
                    if (b.y + b.r > gy) {
                        const y1 = getY(b.x-0.5), y2 = getY(b.x+0.5), ty = y2-y1, l = Math.hypot(1,ty);
                        const ntx = 1/l, nty = ty/l, nx = nty, ny = -ntx; // NORMAL APONTANDO PARA CIMA
                        
                        b.y = gy - b.r; // RESOLUÇÃO DE PENETRAÇÃO
                        const vdn = b.vx*nx + b.vy*ny;
                        const vdt = b.vx*ntx + b.vy*nty;
                        
                        if (vdn > 0) { // Batendo na superfície
                            b.vx = vdt*ntx - vdn*nx*b.elast; b.vy = vdt*nty - vdn*ny*b.elast; // QUIQUE!
                        } else {
                            b.vx = vdt*ntx; b.vy = vdt*nty;
                        }
                        const loss = b.f*5*dt; b.vx *= (1-loss); b.vy *= (1-loss);
                        b.th += Math.max(0, 0.5*b.m*(Math.pow(Math.hypot(b.vx/60, b.vy/60),2)*loss)*20);
                    }
                }
            }
            const speed = Math.hypot(b.vx, b.vy)/60;
            const pe = b.m * 9.8 * Math.max(0, (getY(b.x) - b.y) / 60);
            const ke = 0.5 * b.m * speed * speed;
            const te = pe + ke + b.th; if (te > maxE) maxE = te;
            document.getElementById('val-speed').innerText = speed.toFixed(1) + ' m/s';
            document.getElementById('te-val').innerText = te.toFixed(1) + ' J';

            ctx.clearRect(0,0,w,h);
            ctx.beginPath(); ctx.strokeStyle = '#1e1b4b'; ctx.lineWidth = 14; 
            for (let x=0; x<=w; x+=3) { const y = getY(x); x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
            ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#4f46e5'; ctx.lineWidth = 6;
            for (let x=0; x<=w; x+=3) { const y = getY(x); x===0?ctx.moveTo(x,y-4):ctx.lineTo(x,y-4); }
            ctx.stroke();
            
            ctx.beginPath(); ctx.fillStyle = '#6366f1'; ctx.shadowBlur = 15; ctx.shadowColor = '#6366f1';
            ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

            const bx=25, by=25, bw=140, bh=175;
            ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,12); ctx.fill();
            const mv = Math.max(maxE, 100);
            const db = (v, c, i, l) => {
                const h_ = (v/mv)*(bh-40); ctx.fillStyle = c; ctx.fillRect(bx+15+i*30, by+bh-25-h_, 18, h_);
                ctx.fillStyle='white'; ctx.font='bold 9px Arial'; ctx.fillText(l, bx+15+i*30, by+bh-10);
            };
            db(ke, '#22c55e', 0, 'Cin'); db(pe, '#3b82f6', 1, 'Pot'); db(b.th, '#ef4444', 2, 'Tér'); db(te, '#f59e0b', 3, 'Tot');
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
